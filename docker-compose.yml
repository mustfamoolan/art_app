services:

  # ── Go Application ─────────────────────────────────────────────────────────
  app:
    build: .
    ports:
      - "8080:8080"          # expose on 8080 locally
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DB_DRIVER: postgres
      DB_HOST: db
      DB_PORT: "5432"        # Connect to db service internal port
      CACHE_HOST: redis
      CACHE_PORT: "6379"     # Connect to redis service internal port
    depends_on:
      db:
        condition: service_healthy   # wait for postgres to be ready
      redis:
        condition: service_started
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-artapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_DATABASE:-artapp_db}
    ports:
      - "5433:5432"           # expose so you can connect with a DB client
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USERNAME:-artapp} -d $${DB_DATABASE:-artapp_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
